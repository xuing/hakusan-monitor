<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Live load & queue dashboard for the JAIST Hakusan HPC cluster." />
    <title>Hakusan Monitor</title>

      try { if (localStorage.getItem("hm_theme") === "light") document.documentElement.classList.remove("dark"); } catch (e) {}
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
